# ── Search ──
search:
  categories:
    - cs.CE           # Computational Engineering
    - cs.LG           # Machine Learning
    - cs.NA           # Numerical Analysis
    - physics.flu-dyn # Fluid Dynamics
    - physics.comp-ph # Computational Physics
    - math.NA         # Numerical Analysis

  keywords:
    - "physics-informed neural network"
    - "neural operator"
    - "neural PDE solver"
    - "Fourier neural operator"
    - "DeepONet"
    - "scientific machine learning"
    - "learned simulation"
    - "graph neural network simulation"
    - "differentiable physics"
    - "data-driven turbulence"
    - "machine learning CFD"
    - "neural surrogate model"
    - "operator learning"
    - "physics-constrained"
    - "mesh-free neural"
    - "PINN"
    - "domain decomposition neural"
    - "hybrid solver neural"

  exclude_keywords:
    - "drug discovery"
    - "protein folding"
    - "molecular dynamics"

  max_fetch: 50   # max papers to fetch
  max_digest: 5   # max papers in digest

# ── Digest ──
digest:
  language: "Chinese"  # Chinese | English | mixed
